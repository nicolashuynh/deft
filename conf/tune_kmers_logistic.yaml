defaults:
  - dataset: polymerase
  - featurizer: kmer_count
  - _self_

random_state: 42
kmer_size: 3
cv_folds: 5
cv_scoring: average_precision

C_values: [0.001, 0.01, 0.1, 1.0, 10.0, 100.0, 1000.0]
max_iter: 1000
solver: lbfgs
penalty: l2

output_dir_template: results/${dataset.name}
output_filename: null

featurizer:
  k: ${kmer_size}

hydra:
  job:
    chdir: false
