max_depth: 6
min_samples_leaf_fraction: 0.01
random_state: 42
use_raw_sequence: true
name_experiment: "enhancer_classification_seeds"
condition_name: "k562_minp_avg"
subsample_proportion: 0.1
one_hot_encode: False
test_size: 0.2
content: "You are an expert in biology and DNA sequences."
params_generation:
  target_name: "is_enhancer"
  dataset_info: "This is a dataset about identifying functional DNA enhancers from MPRA data. {condition_details}"
  context_template_name_desc: >-
    Your goal is to help with the task of growing a decision tree to predict {target_name}. 
    {dataset_info}. Given a current node that we want to split in the tree, you will 
    construct a new feature based on the original DNA sequence, such that this new feature 
    is discriminative for the prediction task of classifying {target_name}. The raw 
    feature is the DNA sequence of length 145. The possible 
    nucleotide values are A, C, G, T.
  context_code: "Your goal is to generate a python code to construct a feature, based on a dataframe."
  instructions_name_desc: >-
    Leverage your biology expertise and your creativity to generate a good feature (name, 
    description, justification). This feature can be simple. Importantly, take into account 
    the contextual history given above , which defines the sequence of splitting conditions 
    from the root node up to the current node. Your new feature should not be redundant 
    with the splitting condition features. This point is very important because the dataset 
    at the current node can be small, and you have to avoid overfitting. Another important 
    point: The feature should be interpretable. The feature should capture a single, clear 
    biological mechanism. Use only basic sequence properties that a biologist could understand 
    and find intuitive. Avoid combining multiple biological mechanisms into one feature, 
    which would introduce complexity. Be very explicit in your description on how you compute 
    the feature. Return the feature in the following JSON format:

    {{"rationale": "rationale", "description": "your_feature_description", "name": "your_feature_name"}}

    Only return the JSON object, with no additional text. Do not include "json" in front of it
  instructions_code: >-
    The raw feature is the DNA sequence of length 145. The possible 
    nucleotide values are A, C, G, T. Give instantly executable code without example usage. The calculation for one row must not depend on statistics (e.g., mean, mode, sum, count of unique values, min, max) calculated from other rows or the entirety of the input DataFrame X within this function call. The code must not modify the input DataFrame X in place. Only return the Python function, 
    with no additional text. The name of the argument should be 'X'. Only output one function, 
    this is very important. The function should only return the new feature column. Start your 
    output with the string 'def {Function Name}(X):' do not include 'python' in front of it
  include_ic_samples: true
  include_history: true
  include_feature_description: true
  population_size: 10
  n_prompts: 1
  n_parents_per_prompt: 10
  n_ic_samples: 1
  n_samples_per_prompt: 20
  #n_samples_per_prompt: 8

  n_outcomes_per_sample_code: 1
  use_reflection: true
  list_instructions_reflection:
    - >-
      Your goal is to help with the task of growing a decision tree to classify functional enhancers. {condition_details}. Given a current node that we want to split in the tree, you will construct a new 
      feature based on the original DNA sequence, such that this new feature is discriminative 
      for the prediction task (the DNA sequence has length 145). The feature should be: 
      1. Biologically interpretable - based on possible mechanisms of transcription and intuitive 
      for biologists 2. Computationally clear - specify exact positions and calculation methods, 
      3. Complementary to previous splitting conditions from the root to current node. Your new 
      feature should not be redundant with the splitting condition features. This point is very 
      important because the dataset at the current node can be small, and you have to avoid 
      overfitting. I am going to give you an initial population of features with their respective 
      scores (higher is better). The feature you generate should be as different 
      as possible from the initial population in order to explore new ideas. Another important 
      point: The feature should be interpretable. To assess interpretability, please consider 
      the following aspects: 1) Simplicity: the should be simple and easy to understand for a 
      biologist. An interpretable feature should not be overly complex (and not involve multiple 
      complex phenomena). Hence features which incorporate too many multiple distinct components 
      are NOT simple and should not be generated. 2) Intuitiveness: The feature should be intuitive 
      and easy to explain to a biologist (examples of these are motifs) 3) Relevance: the feature should be relevant to the 
      biological prediction task. Return three things: 
      1. Rationale: describe step by step how you came up with this feature, taking into account 
      BOTH the splitting conditions and the population of candidate features. If you feature 
      involves a physical or biological mechanism, say why it is relevant). 2. Description: 
      precise calculation method 3. Name: clear and descriptive. Return in the following JSON format:

      {{"rationale": "your_rationale", "description": "your_feature_description", "name": "your_feature_name"}}

      Only return the JSON object, with no additional text. Do not include "json" in front of it
    - >-
      Your goal is to help with the task of growing a decision tree to to classify functional enhancers. {condition_details}. Given a current node that we want to split in the tree, you will construct a new 
      feature based on the original DNA sequence, such that this new feature is discriminative 
      for the prediction task (the DNA sequence has length 145). The feature should be: 1. Biologically interpretable - based on possible mechanisms of transcription and intuitive 
      for biologists 2. Computationally clear - specify exact positions and calculation methods, 
      3. Complementary to previous splitting conditions from the root to current node. Your new 
      feature should not be redundant with the splitting condition features. This point is very 
      important because the dataset at the current node can be small, and you have to avoid 
      overfitting. I am going to give you an initial population of features with their respective 
      scores (higher is better). Very important: First identify common ideas of the top 
      performing solutions in the population. Then base your feature on these common ideas and 
      simplify them to get one good feature, but do not simply combine these common ideas 
      (do not just add them for example, that would create too much complexity). Another 
      important point: The feature should be interpretable. To assess interpretability, please 
      consider the following aspects: 1) Simplicity: the should be simple and easy to understand. 
      An interpretable feature should not be overly complex (and not involve multiple complex 
      phenomena). Hence features which incorporate too many multiple distinct components are NOT 
      simple and should not be generated. 2) Intuitiveness: The feature should be intuitive 
      and easy to explain to a biologist (examples of these are motifs) 3) Relevance: the feature should be relevant to the 
      biological prediction task. Return three things: 1. Rationale: describe step by 
      step how you came up with this feature, taking into account BOTH the splitting conditions 
      and the population of candidate features. If you feature involves a physical or biological 
      mechanism, say why it is relevant). 2. Description: precise calculation method 3. Name: 
      clear and descriptive. Return in the following JSON format:

      {{"rationale": "your_rationale", "description": "your_feature_description", "name": "your_feature_name"}}

      Only return the JSON object, with no additional text. Do not include "json" in front of it
  n_reflections: 20
  remove_duplicates: true
  alpha: 0.1
  initialize_with_naive_features: true
  include_code_in_reflection: true
  include_rationale_in_reflection: true
  use_description_in_history: true

defaults:
  - selector: topk
  - llm_models: generic_user
  - llm: default
  - feature_finder: default
  - dataset: mpra_enhancers
  - splitting_criterion: gini
  - tree: default
  - _self_
